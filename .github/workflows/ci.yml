name: CI

on:
  push:
    branches: [main, "claude/**"]
  pull_request:
    branches: [main]

jobs:
  tests:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            api/app/requirements.txt
            api/tests/requirements-test.txt

      # libsndfile1 : requis par soundfile (pocket-tts[audio]) ; libgomp1 : onnxruntime.
      - name: Dépendances système
        run: sudo apt-get update -q && sudo apt-get install -y -q libsndfile1 libgomp1

      - name: Dépendances Python
        run: |
          pip install --upgrade pip
          pip install -r api/app/requirements.txt -r api/tests/requirements-test.txt

      - name: Tests (aucun réseau, tout mocké)
        working-directory: api
        run: python -m pytest tests -q
