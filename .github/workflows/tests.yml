name: tests

on:
  push:
    branches: ["main", "claude/**"]
  pull_request:
    branches: ["main"]

jobs:
  pytest:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: |
            api/app/requirements.txt
            api/tests/requirements-test.txt

      # setuptools/wheel récents : certaines dépendances (docopt) ne buildent pas sans
      - name: Install dependencies
        run: |
          pip install --upgrade pip setuptools wheel
          pip install -r api/app/requirements.txt -r api/tests/requirements-test.txt

      - name: Run test suite
        working-directory: api
        run: pytest tests/ -v
