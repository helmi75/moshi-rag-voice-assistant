services:
  moshi:
    build: ./moshi
    ports:
      - "8091:8091"
    runtime: nvidia
    environment:
      MOSHI_HF_REPO: "${MOSHI_HF_REPO:-kyutai/moshika-pytorch-q8}"
      MOSHI_PORT: "8091"
      MOSHI_HOST: "0.0.0.0"
    volumes:
      - moshi_cache:/root/.cache/huggingface
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [ gpu ]

  api:
    build: ./api
    ports:
      - "8000:8000"
    depends_on:
      - moshi
    environment:
      MODEL_API_URL: "http://moshi:8091"
      TWILIO_ACCOUNT_SID: "${TWILIO_ACCOUNT_SID}"
      TWILIO_AUTH_TOKEN: "${TWILIO_AUTH_TOKEN}"
      TWILIO_NUMBER: "${TWILIO_NUMBER}"

  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - api

volumes:
  moshi_cache:
  caddy_data:
  caddy_config:
