services:
  api:
    build: ./api
    ports:
      - "8000:8000"
    environment:
      OPENROUTER_API_KEY: "${OPENROUTER_API_KEY}"
      OPENROUTER_BASE_URL: "${OPENROUTER_BASE_URL:-https://openrouter.ai/api/v1}"
      LLM_MODEL: "${LLM_MODEL:-openrouter/free}"
      TWILIO_ACCOUNT_SID: "${TWILIO_ACCOUNT_SID}"
      TWILIO_AUTH_TOKEN: "${TWILIO_AUTH_TOKEN}"
      TWILIO_NUMBER: "${TWILIO_NUMBER}"
      DB_PATH: "/app/data/app.db"
      # Pipeline vocal : "gather" (défaut, sans clés STT/TTS) ou "stream"
      VOICE_MODE: "${VOICE_MODE:-gather}"
      PUBLIC_WS_URL: "${PUBLIC_WS_URL:-}"
      DEEPGRAM_API_KEY: "${DEEPGRAM_API_KEY:-}"
      # TTS du mode stream : "pocket" (défaut, voix Kyutai/Unmute, CPU, sans clé)
      # ou "cartesia" (API). HF_HOME met le modèle Pocket TTS en cache dans le volume.
      TTS_PROVIDER: "${TTS_PROVIDER:-pocket}"
      POCKET_TTS_VOICE: "${POCKET_TTS_VOICE:-estelle}"
      POCKET_TTS_LANGUAGE: "${POCKET_TTS_LANGUAGE:-french_24l}"
      HF_HOME: "/app/data/hf"
      CARTESIA_API_KEY: "${CARTESIA_API_KEY:-}"
      CARTESIA_VOICE_ID: "${CARTESIA_VOICE_ID:-}"
    volumes:
      - api_data:/app/data

  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - api

volumes:
  api_data:
  caddy_data:
  caddy_config:
