services:
  api:
    build: ./api
    ports:
      - "8000:8000"
    environment:
      OPENROUTER_API_KEY: "${OPENROUTER_API_KEY}"
      OPENROUTER_BASE_URL: "${OPENROUTER_BASE_URL:-https://openrouter.ai/api/v1}"
      LLM_MODEL: "${LLM_MODEL:-openrouter/free}"
      TWILIO_ACCOUNT_SID: "${TWILIO_ACCOUNT_SID}"
      TWILIO_AUTH_TOKEN: "${TWILIO_AUTH_TOKEN}"
      TWILIO_NUMBER: "${TWILIO_NUMBER}"
      DB_PATH: "/app/data/app.db"
      # Pipeline vocal : "gather" (défaut, sans clés STT/TTS) ou "stream"
      VOICE_MODE: "${VOICE_MODE:-gather}"
      # Voix du <Say> en mode gather (voix neuronale Amazon par défaut)
      TWILIO_VOICE: "${TWILIO_VOICE:-Polly.Lea-Neural}"
      PUBLIC_WS_URL: "${PUBLIC_WS_URL:-}"
      # Naturalité de la conversation (fin de tour / barge-in). Baisser USER_TURN_STOP_TIMEOUT
      # = reprise plus vive quand smart-turn hésite ; monter VAD_CONFIDENCE = moins de faux
      # départs sur le bruit ; VAD_STOP_SECS = tolérance aux pauses courtes en milieu de phrase.
      USER_TURN_STOP_TIMEOUT: "${USER_TURN_STOP_TIMEOUT:-1.0}"
      VAD_CONFIDENCE: "${VAD_CONFIDENCE:-0.85}"
      VAD_START_SECS: "${VAD_START_SECS:-0.2}"
      VAD_STOP_SECS: "${VAD_STOP_SECS:-0.4}"
      # STT du mode stream : "deepgram" (défaut, API nova-2) ou "kyutai" (module ASR de
      # moshi-server, même serveur Modal que le TTS — un fournisseur de moins).
      STT_PROVIDER: "${STT_PROVIDER:-deepgram}"
      DEEPGRAM_API_KEY: "${DEEPGRAM_API_KEY:-}"
      # STT Kyutai (si STT_PROVIDER=kyutai) : URL du module ASR, défaut = MOSHI_TTS_URL.
      MOSHI_STT_URL: "${MOSHI_STT_URL:-}"
      MOSHI_STT_API_KEY: "${MOSHI_STT_API_KEY:-}"
      # TTS du mode stream : "moshi_server" (RECOMMANDÉ : voix Moshi fluide via le
      # serveur Rust sur Modal), "pocket" (voix Kyutai/Unmute CPU, sans clé) ou
      # "cartesia" (API). HF_HOME met le modèle Pocket TTS en cache dans le volume.
      TTS_PROVIDER: "${TTS_PROVIDER:-pocket}"
      # Serveur Rust moshi-server (si TTS_PROVIDER=moshi_server) : URL wss de Modal,
      # clé (défaut public_token) et voix française par défaut (« Développeuse »).
      MOSHI_TTS_URL: "${MOSHI_TTS_URL:-}"
      MOSHI_TTS_API_KEY: "${MOSHI_TTS_API_KEY:-public_token}"
      MOSHI_TTS_VOICE: "${MOSHI_TTS_VOICE:-unmute-prod-website/developpeuse-3.wav}"
      POCKET_TTS_VOICE: "${POCKET_TTS_VOICE:-estelle}"
      POCKET_TTS_LANGUAGE: "${POCKET_TTS_LANGUAGE:-french_24l}"
      # Périphérique d'inférence Pocket TTS : "auto" (GPU si dispo, sinon CPU),
      # "cuda" (force le GPU) ou "cpu". Le GPU rend le TTS temps réel (voir
      # docker-compose.gpu.yml et docs/GPU.md). Sur CPU, préférez VOICE_MODE=gather.
      POCKET_TTS_DEVICE: "${POCKET_TTS_DEVICE:-auto}"
      HF_HOME: "/app/data/hf"
      CARTESIA_API_KEY: "${CARTESIA_API_KEY:-}"
      CARTESIA_VOICE_ID: "${CARTESIA_VOICE_ID:-}"
      # Plateforme admin : compte super-admin semé au 1er démarrage + secret de session.
      # Sans ADMIN_PASSWORD, l'admin est inaccessible (l'app vocale n'est pas affectée).
      ADMIN_PASSWORD: "${ADMIN_PASSWORD:-}"
      ADMIN_EMAIL: "${ADMIN_EMAIL:-admin@local}"
      SESSION_SECRET: "${SESSION_SECRET:-}"
      SESSION_SECURE: "${SESSION_SECURE:-}"
    volumes:
      - api_data:/app/data

  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - api

volumes:
  api_data:
  caddy_data:
  caddy_config:
